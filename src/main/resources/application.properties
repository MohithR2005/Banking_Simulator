spring.application.name=banking-simulator

spring.datasource.url=${DB_URL:jdbc:h2:mem:banking_simulator;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=simple

app.jwt.secret=${JWT_SECRET:resumeProjectSecretKeyForBankingSimulatorMustBeAtLeast256BitsLong}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.fraud.large-transfer-threshold=${FRAUD_LARGE_TRANSFER_THRESHOLD:100000}
app.fraud.daily-transfer-threshold=${FRAUD_DAILY_TRANSFER_THRESHOLD:250000}
app.fraud.max-daily-transfer-count=${FRAUD_MAX_DAILY_TRANSFER_COUNT:5}

server.port=${PORT:${SERVER_PORT:8080}}
